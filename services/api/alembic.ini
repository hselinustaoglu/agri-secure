[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# URL is overridden at runtime by alembic/env.py via the DATABASE_URL env var.
# Do not store credentials here; use environment variables or a secrets manager.
sqlalchemy.url = postgresql://agrisecure:CHANGE_ME@localhost:5432/agrisecure

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
